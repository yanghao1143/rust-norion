name: PR Validation

on:
  pull_request:
    paths:
      - ".github/workflows/pr-validation.yml"
      - ".github/CODEOWNERS"
      - ".github/pull_request_template.md"
      - "Cargo.lock"
      - "Cargo.toml"
      - "CONTRIBUTING.md"
      - "LICENSE"
      - "NOTICE.md"
      - "README.md"
      - "docs/governance/**"
      - "src/**"
      - "crates/norion-core/**"
      - "crates/norion-agent/**"
      - "crates/norion-eval/**"
      - "crates/norion-memory/**"
      - "crates/norion-test/**"
      - "tools/evolution-loop/**"
      - "tools/smartsteam-forge/**"
  push:
    paths:
      - ".github/workflows/pr-validation.yml"
      - ".github/CODEOWNERS"
      - ".github/pull_request_template.md"
      - "Cargo.lock"
      - "Cargo.toml"
      - "CONTRIBUTING.md"
      - "LICENSE"
      - "NOTICE.md"
      - "README.md"
      - "docs/governance/**"
      - "src/**"
      - "crates/norion-core/**"
      - "crates/norion-agent/**"
      - "crates/norion-eval/**"
      - "crates/norion-memory/**"
      - "crates/norion-test/**"
      - "tools/evolution-loop/**"
      - "tools/smartsteam-forge/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  focused-rust:
    name: focused Rust crates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust tooling
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable

      - name: Check formatting for norion-eval
        run: cargo +stable fmt --package norion-eval --check

      - name: Check formatting for rust-norion
        run: cargo +stable fmt --package rust-norion --check

      - name: Check formatting for norion-core
        run: cargo +stable fmt --package norion-core --check

      - name: Check formatting for evolution-loop
        run: cargo +stable fmt --manifest-path tools/evolution-loop/Cargo.toml --check

      - name: Check formatting for norion-test
        run: cargo +stable fmt --package norion-test --check

      - name: Test norion-eval
        run: cargo +stable test --locked --package norion-eval

      - name: Test rust-norion
        run: cargo +stable test --locked --package rust-norion

      - name: Test norion-core
        run: cargo +stable test --locked --package norion-core

      - name: Test norion-agent
        run: cargo +stable test --locked --package norion-agent

      - name: Test norion-memory
        run: cargo +stable test --locked --package norion-memory

      - name: Test norion-test
        run: cargo +stable test --locked --package norion-test

      - name: Test evolution-loop
        run: cargo +stable test --locked --manifest-path tools/evolution-loop/Cargo.toml

      - name: Guard against private or generated artifacts
        shell: bash
        run: |
          if git ls-files | grep -E '(^|/)target/|\.ndkv$|\.safetensors$|\.gguf$|\.bin$|\.pt$|\.pth$|\.ckpt$|\.onnx$|\.log$'; then
            echo "::error::Tracked private/generated artifact found"
            exit 1
          fi

      - name: Guard collaboration and license policy surfaces
        shell: bash
        run: |
          grep -Fq "GNU GENERAL PUBLIC LICENSE" LICENSE
          grep -Fq "Version 3, 29 June 2007" LICENSE
          grep -Fq "released under the GNU General Public License v3.0" NOTICE.md
          grep -Fq "Commercial use is allowed under" README.md
          grep -Fq "owner or maintainer review and approval" README.md
          grep -Fq "Public Collaboration Governance" README.md
          grep -Fq "CODEOWNER approval" CONTRIBUTING.md
          grep -Fq "GPL-3.0" CONTRIBUTING.md
          grep -Fq "maintainer approval" CONTRIBUTING.md
          grep -Fq "default branch is protected" docs/governance/public-collaboration.md
          grep -Fq "Kuberwastaken/claurst" docs/governance/public-collaboration.md
          grep -Fq "Change remains compatible with the GPL-3.0 license" .github/pull_request_template.md
          grep -Fq "External code was not copied from AGPL/proprietary/commercial-restricted/private sources" .github/pull_request_template.md
          grep -Fxq "* @yanghao1143" .github/CODEOWNERS
