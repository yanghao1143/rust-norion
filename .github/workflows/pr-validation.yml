name: PR Validation

on:
  pull_request:
    types: [opened, reopened, synchronize, edited]
  issue_comment:
    types: [created, edited]
  push:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  focused-rust:
    if: github.event_name != 'issue_comment'
    name: focused Rust crates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commit version and deprecation trailers
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bash tools/ci/check-commit-ledger.sh "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          elif [ "${{ github.event_name }}" = "push" ] && [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ] && git rev-parse --verify "${{ github.event.before }}^{commit}" >/dev/null 2>&1; then
            bash tools/ci/check-commit-ledger.sh "${{ github.event.before }}..HEAD"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            bash tools/ci/check-commit-ledger.sh HEAD
          else
            bash tools/ci/check-commit-ledger.sh origin/main..HEAD
          fi

      - name: Check PR version and deprecation ledger
        if: github.event_name == 'pull_request'
        shell: bash
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          printf '%s\n' "$PR_BODY" > "$RUNNER_TEMP/pr-body.txt"
          bash tools/ci/check-commit-ledger.sh --text-file "pull request body" "$RUNNER_TEMP/pr-body.txt"

      - name: Install stable Rust tooling
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable

      - name: Check formatting for norion-eval
        run: cargo +stable fmt --package norion-eval --check

      - name: Check formatting for rust-norion
        run: cargo +stable fmt --package rust-norion --check

      - name: Check formatting for norion-cli
        run: cargo +stable fmt --package norion-cli --check

      - name: Check formatting for norion-core
        run: cargo +stable fmt --package norion-core --check

      - name: Check formatting for evolution-loop
        run: cargo +stable fmt --manifest-path tools/evolution-loop/Cargo.toml --check

      - name: Check formatting for norion-test
        run: cargo +stable fmt --package norion-test --check

      - name: Test norion-eval
        run: cargo +stable test --locked --package norion-eval

      - name: Check rust-norion
        run: cargo +stable check --locked --package rust-norion

      - name: Test issue 19 local model service MVP
        shell: bash
        run: |
          cargo +stable test --locked --package rust-norion model_service_http_smoke_covers_english_chinese_and_rust_prompts -- --nocapture
          cargo +stable test --locked --package rust-norion model_service_openai_chat_completions_stream_emits_chunks -- --nocapture
          cargo +stable test --locked --package rust-norion model_service_openai_chat_completions_cancel_returns_openai_error_json -- --nocapture
          cargo +stable test --locked --package rust-norion model_service_openai_chat_completions_stream_cancel_emits_error_chunk -- --nocapture
          cargo +stable test --locked --package rust-norion model_service_generation_runtime_errors_return_structured_json -- --nocapture
          cargo +stable test --locked --package rust-norion model_service_openai_models_reports_capabilities -- --nocapture
          cargo +stable test --locked --package rust-norion model_service_health_responds_while_generate_is_running -- --nocapture
          cargo +stable test --locked --package rust-norion endpoint_info_json_reports -- --nocapture
          cargo +stable test --locked --package rust-norion parses_openai -- --nocapture
          cargo +stable test --locked --package rust-norion rejects_unsupported_openai_request_fields -- --nocapture
          cargo +stable test --locked --package rust-norion model_service_generate_raw_output_keeps_unrepaired_answer_for_strict_consumers -- --nocapture
          cargo +stable test --locked --package rust-norion runtime_request_wire_marks_chinese_rust_coding_intent -- --nocapture

      - name: Test rust-norion issue 30 focused paths
        shell: bash
        run: |
          cargo +stable test --locked --package rust-norion persistent_roundtrip -- --nocapture
          cargo +stable test --locked --package rust-norion issue30_clean_checkout_demo_writes_digest_only_evidence_packet -- --nocapture
          cargo +stable test --locked --package rust-norion issue30_dispatch_roundtrip_inspect_runs_trace_schema_gate -- --nocapture

      - name: Test issue 37 tenant boundary gates
        shell: bash
        run: |
          cargo +stable test --locked --package rust-norion tenant_scope -- --nocapture
          cargo +stable test --locked --package rust-norion inference_request_tenant_scope_isolates_runtime_cache_reads_and_writes -- --nocapture

      - name: Smoke issue 30 fresh checkout packet
        shell: bash
        run: bash tools/ci/issue30-fresh-checkout-smoke.sh

      - name: Test norion-cli issue 30 evidence packet gates
        run: cargo +stable test --locked --package norion-cli evidence_packet -- --nocapture

      - name: Test norion-core
        run: cargo +stable test --locked --package norion-core

      - name: Test norion-agent
        run: cargo +stable test --locked --package norion-agent

      - name: Test norion-memory
        run: cargo +stable test --locked --package norion-memory

      - name: Test norion-test
        run: cargo +stable test --locked --package norion-test

      - name: Test evolution-loop
        run: cargo +stable test --locked --manifest-path tools/evolution-loop/Cargo.toml

      - name: Guard against private or generated artifacts
        shell: bash
        run: |
          if git ls-files | grep -E '(^|/)target/|\.ndkv$|\.safetensors$|\.gguf$|\.bin$|\.pt$|\.pth$|\.ckpt$|\.onnx$|\.log$'; then
            echo "::error::Tracked private/generated artifact found"
            exit 1
          fi

      - name: Guard collaboration and license policy surfaces
        shell: bash
        run: |
          grep -Fq "GNU GENERAL PUBLIC LICENSE" LICENSE
          grep -Fq "Version 3, 29 June 2007" LICENSE
          grep -Fq "released under the GNU General Public License v3.0" NOTICE.md
          grep -Fq "Commercial use is allowed under" README.md
          grep -Fq "owner or maintainer review and approval" README.md
          grep -Fq "Public Collaboration Governance" README.md
          grep -Fq "CODEOWNER approval" CONTRIBUTING.md
          grep -Fq "GPL-3.0" CONTRIBUTING.md
          grep -Fq "maintainer approval" CONTRIBUTING.md
          grep -Fq "default workflow token is read-only" CONTRIBUTING.md
          grep -Fq "default branch is protected" docs/governance/public-collaboration.md
          grep -Fq "workflows cannot create or approve pull request reviews" docs/governance/public-collaboration.md
          grep -Fq "Kuberwastaken/claurst" docs/governance/public-collaboration.md
          grep -Fq "Change remains compatible with the GPL-3.0 license" .github/pull_request_template.md
          grep -Fq "External code was not copied from AGPL/proprietary/commercial-restricted/private sources" .github/pull_request_template.md
          grep -Fxq "* @yanghao1143" .github/CODEOWNERS
          grep -Fq "MIRRORED_BRANCHES: main" .github/workflows/mirror-gitee.yml
          grep -Fq 'MIRRORED_BRANCHES="${MIRRORED_BRANCHES:-main}"' tools/ci/sync-github-gitee.sh

  issue-comment-ledger:
    if: >-
      github.event_name == 'issue_comment' &&
      (contains(github.event.comment.body, 'Version:') ||
      contains(github.event.comment.body, 'Deprecations:') ||
      contains(github.event.comment.body, 'Refs '))
    name: issue comment ledger
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check issue comment version and deprecation ledger
        shell: bash
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          printf '%s\n' "$COMMENT_BODY" > "$RUNNER_TEMP/issue-comment-body.txt"
          bash tools/ci/check-commit-ledger.sh --text-file-ledger-only "issue comment body" "$RUNNER_TEMP/issue-comment-body.txt"
