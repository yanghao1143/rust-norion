name: Mirror to Gitee

on:
  push:
    branches:
      - "**"
    tags:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mirror:
    name: Sync GitHub refs to Gitee
    runs-on: ubuntu-latest
    if: github.repository == 'yanghao1143/rust-norion'
    steps:
      - name: Checkout full repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push branches and tags to Gitee
        env:
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_REPOSITORY: babalibaba/rust-norion
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${GITEE_USERNAME}" || -z "${GITEE_TOKEN}" ]]; then
            echo "GITEE_USERNAME and GITEE_TOKEN secrets are required." >&2
            exit 1
          fi

          git remote remove gitee 2>/dev/null || true
          git remote add gitee "https://${GITEE_USERNAME}:${GITEE_TOKEN}@gitee.com/${GITEE_REPOSITORY}.git"
          git fetch origin '+refs/heads/*:refs/remotes/origin/*' '+refs/tags/*:refs/tags/*' --prune

          while IFS= read -r ref; do
            branch="${ref#origin/}"
            if [[ "${branch}" == "HEAD" ]]; then
              continue
            fi
            git push gitee "refs/remotes/origin/${branch}:refs/heads/${branch}"
          done < <(git for-each-ref --format='%(refname:short)' refs/remotes/origin)

          git push gitee --tags
