name: Community Outreach Reminder

on:
  schedule:
    - cron: "0 2 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  reminder:
    name: Open monthly outreach checklist
    runs-on: ubuntu-latest
    if: github.repository == 'yanghao1143/rust-norion'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create or refresh outreach label
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create community-outreach --color 0E8A16 --description "Community outreach and contributor recruitment" || true

      - name: Validate outreach registry
        shell: pwsh
        run: |
          ./tools/outreach/validate-community-registry.ps1

      - name: Generate outreach draft
        shell: pwsh
        run: |
          ./tools/outreach/generate-community-update.ps1 -SinceDays 30 -MaxCommits 20 -OutFile outreach-draft.md
          ./tools/outreach/generate-community-queue.ps1 -OutFile outreach-queue.md
          ./tools/outreach/discover-community-candidates.ps1 -LimitPerQuery 20 -MinStars 10 -IncludeGitee -OutFile outreach-candidates.md
          ./tools/outreach/generate-publication-update.ps1 -SinceDays 30 -MaxCommits 40 -OutDir publication-update

      - name: Upload generated outreach artifacts
        uses: actions/upload-artifact@v4
        with:
          name: community-outreach-${{ github.run_id }}
          path: |
            outreach-draft.md
            outreach-queue.md
            outreach-candidates.md
            publication-update/**

      - name: Create monthly outreach issue if missing
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          month="$(date -u +'%Y-%m')"
          title="Community outreach checklist ${month}"
          existing="$(gh issue list --state open --label community-outreach --search "${title} in:title" --json number --jq '.[0].number // empty')"
          if [ -n "${existing}" ]; then
            echo "Outreach issue already exists: #${existing}"
            exit 0
          fi

          body_file="$(mktemp)"
          cat > "${body_file}" <<'EOF'
          This scheduled issue tracks the next manual rust-norion outreach cycle.

          Runbook: `docs/runbooks/community-outreach.md`
          Registry: `docs/outreach/community-registry.yml`
          Templates: `docs/outreach/templates/`

          Checklist:

          - [ ] Summarize concrete changes since the last outreach cycle.
          - [ ] Pick 3-5 relevant communities from the registry.
          - [ ] Use a tailored Chinese or English template.
          - [ ] Submit only where self-submission or project updates are allowed.
          - [ ] Record proof URLs and dates in the registry.
          - [ ] Do not bulk-post identical recruitment text.

          Candidate channels:

          - RustCn weekly
          - users.rust-lang.org
          - RustCC forum
          - CSDN
          - awesome-rust-llm
          - Awesome Rust Machine Learning
          - This Week in Rust, only after a notable release/article

          Keep claims modest: rust-norion is a research-engineering prototype,
          not a production LLM inference kernel.
          EOF

          append_limited_section() {
            local title="$1"
            local file="$2"
            local max_bytes="$3"

            {
              echo
              echo "## ${title}"
              echo
            } >> "${body_file}"

            if [ ! -s "${file}" ]; then
              echo "_No generated content._" >> "${body_file}"
              return
            fi

            local size
            size="$(wc -c < "${file}")"
            head -c "${max_bytes}" "${file}" >> "${body_file}"
            echo >> "${body_file}"
            if [ "${size}" -gt "${max_bytes}" ]; then
              echo >> "${body_file}"
              echo "_Truncated in this issue; download the workflow artifact for the full generated file._" >> "${body_file}"
            fi
          }

          append_limited_section "Generated draft" outreach-draft.md 16000
          append_limited_section "Publication update packet" publication-update/dataset-description.zh.md 12000
          append_limited_section "Outreach queue" outreach-queue.md 24000
          append_limited_section "Candidate discovery" outreach-candidates.md 16000

          gh issue create \
            --title "${title}" \
            --label community-outreach \
            --body-file "${body_file}"
