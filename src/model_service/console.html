<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <link rel="icon" href="data:,">
  <title>北极星能力测试台</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, "Segoe UI", "Microsoft YaHei", sans-serif;
      color: #17211d;
      background: #eef2ef;
      font-synthesis: none;
      letter-spacing: 0;
      --bg: #eef2ef;
      --surface: #ffffff;
      --surface-muted: #f5f7f5;
      --line: #d9e0dc;
      --line-strong: #bcc8c1;
      --text: #17211d;
      --muted: #637069;
      --green: #087b58;
      --green-soft: #e8f5ef;
      --blue: #295e98;
      --blue-soft: #edf4fb;
      --amber: #9a5b00;
      --amber-soft: #fff4df;
      --red: #a53636;
      --shadow: 0 10px 28px rgba(20, 36, 28, 0.08);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body { min-height: 100vh; background: var(--bg); overflow: hidden; }
    button, textarea, select, input { font: inherit; letter-spacing: 0; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: 0.55; }
    :focus-visible { outline: 3px solid rgba(41, 94, 152, 0.25); outline-offset: 2px; }

    .app {
      display: grid;
      grid-template-columns: 204px minmax(440px, 1fr) minmax(330px, 410px);
      min-height: 100vh;
      max-height: 100vh;
      overflow: hidden;
    }

    .conversation, .panel, .sidebar {
      scrollbar-color: #8da198 #e7ece9;
      scrollbar-gutter: stable;
      scrollbar-width: thin;
    }
    .conversation::-webkit-scrollbar, .panel::-webkit-scrollbar, .sidebar::-webkit-scrollbar { width: 10px; height: 10px; }
    .conversation::-webkit-scrollbar-track, .panel::-webkit-scrollbar-track, .sidebar::-webkit-scrollbar-track { background: #e7ece9; }
    .conversation::-webkit-scrollbar-thumb, .panel::-webkit-scrollbar-thumb, .sidebar::-webkit-scrollbar-thumb { background: #8da198; border: 2px solid #e7ece9; border-radius: 5px; }

    .sidebar {
      display: flex;
      flex-direction: column;
      min-width: 0;
      padding: 20px 14px;
      color: #e8f2ed;
      background: #17251f;
      border-right: 1px solid #26362f;
    }

    .brand { display: flex; align-items: center; gap: 11px; padding: 0 8px 22px; }
    .brand-mark {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border: 1px solid #5c786b;
      border-radius: 7px;
      color: #9be0c0;
      font-size: 19px;
      font-weight: 800;
    }
    .brand strong { display: block; font-size: 17px; }
    .brand span { display: block; margin-top: 2px; color: #98aaa1; font-size: 11px; }

    .nav-label { margin: 8px 8px 8px; color: #82968c; font-size: 11px; font-weight: 700; text-transform: uppercase; }
    .case-list { display: grid; gap: 5px; }
    .case-button {
      width: 100%;
      padding: 9px 10px;
      border: 1px solid transparent;
      border-radius: 6px;
      color: #cbd8d1;
      background: transparent;
      text-align: left;
      font-size: 13px;
    }
    .case-button:hover { background: #22342b; border-color: #34493f; color: #fff; }
    .case-button.active { background: #28463a; border-color: #426657; color: #fff; }

    .sidebar-status {
      margin-top: auto;
      padding: 12px 10px;
      border-top: 1px solid #33453d;
      color: #a8b8b0;
      font-size: 12px;
      line-height: 1.6;
    }
    .sidebar-status strong { color: #edf5f1; font-weight: 600; }

    .workspace {
      min-width: 0;
      min-height: 0;
      max-height: 100vh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      overflow: hidden;
      background: var(--surface);
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 64px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--line);
    }
    .topbar h1 { margin: 0; font-size: 16px; font-weight: 720; }
    .runtime-strip { display: flex; align-items: center; justify-content: flex-end; gap: 7px; min-width: 0; flex-wrap: wrap; }
    .status, .chip {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 4px 8px;
      border: 1px solid var(--line);
      border-radius: 5px;
      color: var(--muted);
      background: var(--surface-muted);
      font-size: 11px;
      white-space: nowrap;
    }
    .status::before { content: ""; width: 7px; height: 7px; margin-right: 6px; border-radius: 50%; background: #839088; }
    .status.ready { color: #075c42; background: var(--green-soft); border-color: #b9dfcd; }
    .status.ready::before { background: var(--green); }
    .status.warn { color: var(--amber); background: var(--amber-soft); border-color: #ecd4a8; }
    .status.warn::before { background: #c17a0b; }
    .status.error { color: var(--red); background: #fff0f0; border-color: #ebc5c5; }
    .status.error::before { background: var(--red); }

    .conversation { min-height: 0; overflow-y: scroll; padding: 22px max(22px, calc((100% - 780px) / 2)); scroll-behavior: smooth; }
    .empty-state {
      display: grid;
      place-items: center;
      min-height: 100%;
      color: var(--muted);
      text-align: center;
    }
    .empty-state strong { display: block; margin-bottom: 8px; color: var(--text); font-size: 18px; }
    .empty-state span { font-size: 13px; }
    .messages { display: grid; gap: 18px; }
    .message { display: grid; grid-template-columns: 30px minmax(0, 1fr); gap: 10px; }
    .avatar {
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--surface-muted);
      color: var(--muted);
      font-size: 11px;
      font-weight: 750;
    }
    .message.assistant .avatar { color: var(--green); background: var(--green-soft); border-color: #b9dfcd; }
    .message.error .avatar { color: var(--red); background: #fff0f0; border-color: #ebc5c5; }
    .message-body { min-width: 0; }
    .message-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin: 3px 0 7px; }
    .message-head strong { font-size: 12px; }
    .message-head span { color: var(--muted); font-size: 11px; }
    .message-content {
      margin: 0;
      color: #26322c;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .artifact-runner { margin-top: 12px; border: 1px solid var(--line-strong); background: #fff; }
    .artifact-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; min-height: 38px; padding: 7px 10px; border-bottom: 1px solid var(--line); background: var(--surface-muted); }
    .artifact-toolbar strong { font-size: 12px; }
    .artifact-status { color: var(--muted); font-size: 11px; font-weight: 700; }
    .artifact-status.good { color: var(--green); }
    .artifact-status.warn { color: var(--amber); }
    .artifact-status.bad { color: var(--red); }
    .artifact-frame { display: block; width: 100%; height: min(60vh, 620px); min-height: 390px; border: 0; background: #fff; }
    .artifact-findings { display: none; margin: 0; padding: 8px 10px; border-top: 1px solid var(--line); color: var(--red); background: #fff7f7; font-size: 11px; line-height: 1.55; overflow-wrap: anywhere; }
    .artifact-findings.visible { display: block; }

    .composer-shell { padding: 13px 20px 18px; border-top: 1px solid var(--line); background: #fbfcfb; }
    .composer { max-width: 820px; margin: 0 auto; border: 1px solid var(--line-strong); border-radius: 8px; background: var(--surface); box-shadow: var(--shadow); overflow: hidden; }
    .composer textarea {
      display: block;
      width: 100%;
      min-height: 82px;
      max-height: 180px;
      padding: 13px 14px 8px;
      border: 0;
      resize: vertical;
      color: var(--text);
      background: transparent;
      line-height: 1.5;
    }
    .composer textarea:focus { outline: none; }
    .composer-actions { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 8px; border-top: 1px solid #edf0ee; }
    .field-row, .action-row { display: flex; align-items: center; gap: 7px; min-width: 0; }
    .action-row { flex-wrap: wrap; justify-content: flex-end; }
    select, input[type="number"] {
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 5px;
      color: #35433c;
      background: #f8faf8;
      font-size: 12px;
    }
    select { min-width: 82px; padding: 0 25px 0 8px; }
    input[type="number"] { width: 68px; padding: 0 7px; }
    .button {
      min-height: 32px;
      padding: 6px 11px;
      border: 1px solid var(--line-strong);
      border-radius: 5px;
      color: #35433c;
      background: #fff;
      font-size: 12px;
      font-weight: 650;
    }
    .button:hover { border-color: #8fa098; background: #f6f8f7; }
    .button.primary { color: #fff; background: var(--green); border-color: var(--green); }
    .button.primary:hover { background: #066b4d; }
    .button.compare { color: #24517e; background: var(--blue-soft); border-color: #bfd3e8; }
    .button.evolve { color: #5f4310; background: #fff7df; border-color: #ddc071; }
    .button.rollback { color: #7a3030; background: #fff2f2; border-color: #e2b8b8; }
    .button:disabled { cursor: not-allowed; opacity: 0.48; }

    .inspector {
      min-width: 0;
      min-height: 0;
      max-height: 100vh;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      overflow: hidden;
      background: #f7f9f7;
      border-left: 1px solid var(--line);
    }
    .inspector-head { display: flex; align-items: center; justify-content: space-between; min-height: 64px; padding: 12px 16px; border-bottom: 1px solid var(--line); }
    .inspector-head strong { font-size: 14px; }
    .icon-button { width: 30px; height: 30px; border: 1px solid var(--line); border-radius: 5px; color: var(--muted); background: #fff; font-size: 16px; }
    .tabs { display: grid; grid-template-columns: repeat(4, 1fr); border-bottom: 1px solid var(--line); background: #fff; }
    .tab { min-width: 0; padding: 11px 4px 9px; border: 0; border-bottom: 2px solid transparent; color: var(--muted); background: transparent; font-size: 12px; }
    .tab.active { color: var(--green); border-bottom-color: var(--green); font-weight: 700; }
    .panel { min-height: 0; overflow: auto; padding: 15px; }
    .metric-group { margin-bottom: 18px; }
    .metric-group h2 { margin: 0 0 8px; color: #617068; font-size: 11px; font-weight: 750; text-transform: uppercase; }
    .metric-table { width: 100%; border-collapse: collapse; table-layout: fixed; background: #fff; border: 1px solid var(--line); }
    .metric-table th, .metric-table td { padding: 8px 9px; border-bottom: 1px solid #e9eeeb; font-size: 12px; text-align: left; vertical-align: top; overflow-wrap: anywhere; }
    .metric-table tr:last-child th, .metric-table tr:last-child td { border-bottom: 0; }
    .metric-table th { width: 54%; color: var(--muted); font-weight: 550; }
    .metric-table td { color: var(--text); font-variant-numeric: tabular-nums; }
    .metric-table td.good { color: var(--green); font-weight: 700; }
    .metric-table td.warn { color: var(--amber); font-weight: 700; }
    .metric-table td.bad { color: var(--red); font-weight: 700; }
    .metric-value { display: block; }
    .metric-comparison { display: flex; flex-wrap: wrap; gap: 3px 8px; margin-top: 3px; color: var(--muted); font-size: 10px; }
    .delta { color: var(--blue); }
    .raw {
      margin: 0;
      min-height: 100%;
      padding: 12px;
      border: 1px solid var(--line);
      color: #294137;
      background: #fff;
      font-family: "Cascadia Code", Consolas, monospace;
      font-size: 11px;
      line-height: 1.55;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .mobile-inspector-toggle { display: none; }

    @media (max-width: 1120px) {
      .app { grid-template-columns: 176px minmax(420px, 1fr) 340px; }
      .conversation { padding-left: 22px; padding-right: 22px; }
    }

    @media (max-width: 880px) {
      body { overflow: auto; }
      .app { display: grid; grid-template-columns: 1fr; grid-template-rows: auto minmax(580px, 1fr) auto; max-height: none; min-height: 100vh; }
      .sidebar { position: sticky; top: 0; z-index: 10; flex-direction: row; align-items: center; gap: 8px; padding: 8px 12px; border-right: 0; border-bottom: 1px solid #26362f; overflow-x: auto; }
      .brand { flex: 0 0 auto; padding: 0 10px 0 0; }
      .brand-mark { width: 30px; height: 30px; }
      .brand span, .nav-label, .sidebar-status { display: none; }
      .case-list { display: flex; gap: 5px; }
      .case-button { width: auto; white-space: nowrap; padding: 7px 9px; }
      .workspace { min-height: 580px; }
      .workspace, .inspector { max-height: none; overflow: visible; }
      .inspector { min-height: 500px; border-left: 0; border-top: 1px solid var(--line-strong); }
      .panel { max-height: 540px; }
      .mobile-inspector-toggle { display: inline-flex; }
      .inspector.collapsed { display: none; }
    }

    @media (max-width: 560px) {
      .topbar { align-items: flex-start; padding: 11px 13px; }
      .runtime-strip .chip { display: none; }
      .conversation { padding: 18px 13px; }
      .composer-shell { padding: 10px 10px 14px; }
      .composer-actions { align-items: stretch; flex-direction: column; }
      .field-row, .action-row { justify-content: space-between; }
      .action-row .button { flex: 1; }
      .message { grid-template-columns: 27px minmax(0, 1fr); gap: 8px; }
      .avatar { width: 27px; height: 27px; }
      .inspector-head { min-height: 52px; }
      .artifact-frame { min-height: 360px; height: 62vh; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="sidebar" aria-label="测试场景">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">N</div>
        <div><strong>北极星</strong><span>能力测试台</span></div>
      </div>
      <div class="nav-label">测试场景</div>
      <div class="case-list">
        <button class="case-button active" data-case="general">综合推理</button>
        <button class="case-button" data-case="coding">Rust 代码</button>
        <button class="case-button" data-case="memory">记忆复用</button>
        <button class="case-button" data-case="long">长文分析</button>
      </div>
      <div class="sidebar-status">
        <div>会话 <strong id="sessionShort">-</strong></div>
        <div>请求 <strong id="requestCount">0</strong></div>
      </div>
    </aside>

    <section class="workspace" aria-label="对话测试">
      <header class="topbar">
        <div>
          <h1>能力联调</h1>
        </div>
        <div class="runtime-strip">
          <span id="connectionStatus" class="status">连接中</span>
          <span id="runtimeMode" class="chip">后端: -</span>
          <span id="runtimeLane" class="chip">规划通道: -</span>
          <button id="mobileInspectorToggle" class="button mobile-inspector-toggle" type="button">检查器</button>
        </div>
      </header>

      <div id="conversation" class="conversation" aria-live="polite">
        <div id="emptyState" class="empty-state">
          <div><strong>等待能力测试</strong><span>选择场景或输入任务</span></div>
        </div>
        <div id="messages" class="messages"></div>
      </div>

      <div class="composer-shell">
        <form id="composer" class="composer">
          <textarea id="prompt" aria-label="测试任务" placeholder="输入要测试的任务" required></textarea>
          <div class="composer-actions">
            <div class="field-row">
              <select id="profile" aria-label="任务档位">
                <option value="general">通用</option>
                <option value="coding">代码</option>
                <option value="writing">写作</option>
                <option value="long">长文</option>
              </select>
              <input id="maxTokens" aria-label="最大令牌" type="number" min="8" max="4096" step="8" value="256">
            </div>
            <div class="action-row">
              <button id="clearButton" class="button" type="button">清空</button>
              <button id="compareButton" class="button compare" type="button">双轮对比</button>
              <button id="evolveButton" class="button evolve" type="button" disabled>应用进化</button>
              <button id="rollbackButton" class="button rollback" type="button" disabled>回滚进化</button>
              <button id="sendButton" class="button primary" type="submit">生成结果</button>
            </div>
          </div>
        </form>
      </div>
    </section>

    <aside id="inspector" class="inspector" aria-label="运行检查器">
      <div class="inspector-head">
        <strong>运行检查器</strong>
        <button id="refreshButton" class="icon-button" type="button" aria-label="刷新运行状态" title="刷新运行状态">↻</button>
      </div>
      <div class="tabs" role="tablist">
        <button class="tab active" role="tab" data-tab="dna" aria-selected="true">DNA</button>
        <button class="tab" role="tab" data-tab="routing" aria-selected="false">路由</button>
        <button class="tab" role="tab" data-tab="memory" aria-selected="false">记忆</button>
        <button class="tab" role="tab" data-tab="raw" aria-selected="false">JSON</button>
      </div>
      <div id="panel" class="panel"></div>
    </aside>
  </main>

  <script>
    const scenarios = {
      general: {
        profile: "general",
        prompt: "一个离线推理服务连续三次响应变慢，内存命中率上升但输出质量下降。请给出最可能的原因、验证顺序和最小修复方案。"
      },
      coding: {
        profile: "coding",
        prompt: "请审查这段 Rust 代码并给出可编译修复：\n\nfn first(items: Vec<String>) -> &str {\n    &items[0]\n}"
      },
      memory: {
        profile: "general",
        prompt: "记住规则：项目代号 Polaris-17 的发布门槛是延迟低于 120ms 且回归测试全绿。然后复述发布门槛并说明你会如何持久化这条经验。"
      },
      long: {
        profile: "long",
        prompt: "比较以下三个方案并给出选择：A 全量注意力，质量高但算力开销大；B 分层路由，按任务动态分配注意力；C 只依赖检索，速度快但跨段推理弱。约束：本地运行、内存有限、需要持续学习且不能频繁重训。"
      }
    };

    const sessionStorageKey = "rust-norion-console-session-v1";
    const persistedSessionId = localStorage.getItem(sessionStorageKey);
    const sessionId = persistedSessionId || `console-${Date.now()}-${Math.random().toString(16).slice(2, 8)}`;
    localStorage.setItem(sessionStorageKey, sessionId);

    const state = {
      sessionId,
      messages: [],
      activeTab: "dna",
      lastResponse: null,
      previousResponse: null,
      health: null,
      models: null,
      requestCount: 0,
      busy: false,
      evolutionToken: null,
      rollbackToken: null,
      behaviorValidation: null
    };

    const elements = {
      conversation: document.getElementById("conversation"),
      emptyState: document.getElementById("emptyState"),
      messages: document.getElementById("messages"),
      prompt: document.getElementById("prompt"),
      profile: document.getElementById("profile"),
      maxTokens: document.getElementById("maxTokens"),
      connectionStatus: document.getElementById("connectionStatus"),
      runtimeMode: document.getElementById("runtimeMode"),
      runtimeLane: document.getElementById("runtimeLane"),
      requestCount: document.getElementById("requestCount"),
      panel: document.getElementById("panel"),
      inspector: document.getElementById("inspector"),
      sendButton: document.getElementById("sendButton"),
      compareButton: document.getElementById("compareButton"),
      evolveButton: document.getElementById("evolveButton"),
      rollbackButton: document.getElementById("rollbackButton")
    };

    document.getElementById("sessionShort").textContent = state.sessionId.slice(-8);

    function escapeHtml(value) {
      return String(value ?? "-")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    const metricNumberFormat = new Intl.NumberFormat("zh-CN", { maximumFractionDigits: 3 });

    function display(value) {
      if (value === null || value === undefined || value === "") return "-";
      if (typeof value === "boolean") return value ? "是" : "否";
      if (typeof value === "number" && Number.isFinite(value)) {
        return metricNumberFormat.format(Math.abs(value) < 0.0005 ? 0 : value);
      }
      if (Array.isArray(value)) return value.length ? value.join(", ") : "0";
      return String(value);
    }

    function metricRows(rows, previous) {
      return `<table class="metric-table"><tbody>${rows.map(([label, value, key, tone]) => {
        let comparison = "";
        if (previous && key && typeof value === "number" && typeof previous[key] === "number") {
          const change = value - previous[key];
          comparison = `<span class="metric-comparison"><span>基线 ${escapeHtml(display(previous[key]))}</span><span class="delta">Δ ${change > 0 ? "+" : ""}${escapeHtml(display(change))}</span></span>`;
        }
        return `<tr><th>${escapeHtml(label)}</th><td class="${tone || ""}"><span class="metric-value">${escapeHtml(display(value))}</span>${comparison}</td></tr>`;
      }).join("")}</tbody></table>`;
    }

    function metricGroup(title, rows, previous) {
      return `<section class="metric-group"><h2>${escapeHtml(title)}</h2>${metricRows(rows, previous)}</section>`;
    }

    function responseMeta(response) {
      return response?.norion || {};
    }

    function apiErrorText(data, status) {
      const value = data?.error?.message || data?.error || data?.message;
      if (typeof value === "string" && value.trim()) return value;
      if (value && typeof value === "object") return JSON.stringify(value);
      return `HTTP ${status}`;
    }

    function mutationApplied(response) {
      const dna = responseMeta(response).dna_closed_loop || {};
      return dna.mutation_applied === true
        && Number(dna.mutation_count) > 0
        && Number(dna.generation_after) > Number(dna.generation_before);
    }

    function renderInspector() {
      const current = responseMeta(state.lastResponse);

    function setStatus(kind, label) {
      elements.connectionStatus.className = `status ${kind || ""}`;
      elements.connectionStatus.textContent = label;
    }

    async function refreshRuntime() {
      try {
        const [healthResponse, modelsResponse] = await Promise.all([fetch("/health"), fetch("/v1/models")]);
        state.health = await healthResponse.json();
        state.models = await modelsResponse.json();
        const builtIn = state.health.runtime_mode === "built-in";
        elements.runtimeMode.textContent = builtIn
          ? "后端: 内置测试（非模型）"
          : `后端: ${display(state.health.gemma_runtime_model || state.health.runtime_mode)}`;
        elements.runtimeLane.textContent = builtIn
          ? `规划通道: ${display(state.health.device_primary_lane)}`
          : `通道: ${display(state.health.runtime_mode)}${state.health.newapi_fallback?.configured ? ` · 候补 ${display(state.health.newapi_fallback.allowed_models)}` : ""}`;
        if (!healthResponse.ok || !state.health.ok) setStatus("error", "服务异常");
        else if (builtIn) setStatus("warn", "控制面就绪 · 未接模型");
        else if (state.health.readiness_ok && state.health.safe_device_ok) setStatus("ready", "已就绪");
        else setStatus("warn", "可运行 · 有告警");
      } catch (error) {
        state.health = { ok: false, error: error.message };
        setStatus("error", "连接失败");
      }
      renderInspector();
    }

    function extractHtmlArtifact(answer) {
      const fenced = String(answer || "").match(/```(?:html)?\s*([\s\S]*?)```/i);
      if (fenced && /<!doctype\s+html|<html[\s>]/i.test(fenced[1])) return fenced[1].trim();
      const start = String(answer || "").search(/<!doctype\s+html|<html[\s>]/i);
      if (start < 0) return null;
      const source = String(answer).slice(start);
      const end = source.toLowerCase().lastIndexOf("</html>");
      return (end >= 0 ? source.slice(0, end + 7) : source).trim();
    }

    function artifactTaskKind(prompt) {
      return /五子棋|gomoku/i.test(prompt) ? "gomoku" : "generic_html";
    }

    function artifactHarness(validationId, taskKind) {
      const failureCodes = new Set();
      const passedChecks = [];
      let completed = false;
      const fail = (code) => failureCodes.add(code);
      const pass = (check) => passedChecks.push(check);
      const waitForPaint = () => new Promise((resolve) => setTimeout(resolve, 0));
      const finish = (status) => {
        if (completed) return;
        completed = true;
        parent.postMessage({
          type: "norion-artifact-validation",
          validationId,
          status,
          validator: taskKind,
          codes: Array.from(failureCodes),
          checks: passedChecks
        }, "*");
      };

      addEventListener("error", () => fail("artifact_runtime_error"));
      addEventListener("unhandledrejection", () => fail("artifact_unhandled_rejection"));

      const run = async () => {
        await waitForPaint();
        if (taskKind !== "gomoku") {
          finish(failureCodes.size ? "failed" : "unverified");
          return;
        }

        const rawCells = Array.from(new Set([
          ...document.querySelectorAll("[data-row][data-col]"),
          ...document.querySelectorAll(".cell, .grid-cell, .intersection, .board-cell")
        ])).filter((element) => element instanceof HTMLElement);
        if (rawCells.length < 225) {
          fail("gomoku_15x15_cells_missing");
          finish("failed");
          return;
        }

        const cells = rawCells.slice(0, 225);
        const coordinateCells = cells.filter((cell) => cell.hasAttribute("data-row") && cell.hasAttribute("data-col"));
        const rowValues = coordinateCells.map((cell) => Number(cell.getAttribute("data-row"))).filter(Number.isFinite);
        const colValues = coordinateCells.map((cell) => Number(cell.getAttribute("data-col"))).filter(Number.isFinite);
        const minRow = rowValues.length ? Math.min(...rowValues) : 0;
        const minCol = colValues.length ? Math.min(...colValues) : 0;
        const coordinateMap = new Map();
        for (const cell of coordinateCells) {
          const row = Number(cell.getAttribute("data-row")) - minRow;
          const col = Number(cell.getAttribute("data-col")) - minCol;
          if (Number.isInteger(row) && Number.isInteger(col)) coordinateMap.set(`${row}:${col}`, cell);
        }
        const cellAt = (row, col) => coordinateMap.get(`${row}:${col}`) || cells[row * 15 + col];
        const pieceOf = (cell) => {
          if (!cell) return null;
          const nodes = [cell, ...cell.querySelectorAll("*")];
          const signal = nodes.map((node) => [
            node.className,
            node.getAttribute?.("data-player"),
            node.getAttribute?.("data-piece"),
            node.getAttribute?.("aria-label"),
            node.textContent
          ].filter(Boolean).join(" ")).join(" ").toLowerCase();
          if (/(white|白棋|白子|player[-_ ]?2|stone[-_ ]?2)/i.test(signal)) return "white";
          if (/(black|黑棋|黑子|player[-_ ]?1|stone[-_ ]?1)/i.test(signal)) return "black";
          return null;
        };
        const occupiedCount = () => cells.filter((cell) => pieceOf(cell)).length;
        const statusNodes = () => Array.from(document.querySelectorAll(
          "[id*='status' i], [class*='status' i], [id*='winner' i], [class*='winner' i], [id*='result' i], [class*='result' i], [role='status']"
        ));
        const winnerColor = () => {
          for (const node of statusNodes()) {
            const text = String(node.textContent || "").replace(/\s+/g, " ").trim();
            if (!text) continue;
            if (/(?:胜利者|获胜方|winner)\s*[:：-]?\s*(?:白棋|白子|white)/i.test(text)
              || /(?:白棋|白子|white).*(?:胜利|获胜|赢了|wins?)/i.test(text)) return "white";
            if (/(?:胜利者|获胜方|winner)\s*[:：-]?\s*(?:黑棋|黑子|black)/i.test(text)
              || /(?:黑棋|黑子|black).*(?:胜利|获胜|赢了|wins?)/i.test(text)) return "black";
            if (/(?:\bwin\b|wins?|victory|胜利|获胜|赢了)/i.test(text)) return "unknown";
          }
          return null;
        };
        const findButton = (pattern) => Array.from(document.querySelectorAll("button, input[type='button']"))
          .find((button) => pattern.test(String(button.textContent || button.value || "").trim()));
        const resetButton = findButton(/重新开始|重置|reset|new game/i);
        const undoButton = findButton(/悔棋|撤销|undo/i);
        if (!resetButton) fail("gomoku_reset_control_missing");
        if (!undoButton) fail("gomoku_undo_control_missing");
        if (occupiedCount() !== 0) fail("gomoku_initial_board_not_empty");
        if (winnerColor()) fail("gomoku_initial_winner_present");
        if (failureCodes.size) {
          finish("failed");
          return;
        }
        pass("gomoku_initial_state");

        const clickMove = async (row, col, expectedPiece) => {
          const cell = cellAt(row, col);
          if (!cell) {
            fail("gomoku_target_cell_missing");
            return;
          }
          cell.click();
          await waitForPaint();
          if (expectedPiece && pieceOf(cell) !== expectedPiece) {
            fail(expectedPiece === "black" ? "gomoku_black_turn_not_rendered" : "gomoku_white_turn_not_rendered");
          }
        };
        const resetBoard = async () => {
          if (!resetButton || resetButton.disabled) {
            fail("gomoku_reset_unavailable_after_win");
            return false;
          }
          resetButton.click();
          await waitForPaint();
          if (occupiedCount() !== 0 || winnerColor()) {
            fail("gomoku_reset_failed");
            return false;
          }
          return true;
        };
        const lines = [
          [[7, 3], [7, 4], [7, 5], [7, 6], [7, 7]],
          [[3, 7], [4, 7], [5, 7], [6, 7], [7, 7]],
          [[3, 3], [4, 4], [5, 5], [6, 6], [7, 7]],
          [[3, 11], [4, 10], [5, 9], [6, 8], [7, 7]]
        ];
        const fillers = [[0, 0], [0, 2], [0, 4], [0, 6]];

        for (let direction = 0; direction < lines.length; direction += 1) {
          if (direction > 0 && !(await resetBoard())) break;
          for (let move = 0; move < 4; move += 1) {
            await clickMove(...lines[direction][move], "black");
            if (winnerColor()) fail("gomoku_premature_winner_before_fifth_black");
            await clickMove(...fillers[move], "white");
            if (winnerColor()) fail("gomoku_premature_winner_after_four_white");
          }
          await clickMove(...lines[direction][4], "black");
          const winner = winnerColor();
          if (!winner) fail("gomoku_fifth_move_no_winner");
          if (winner && winner !== "black") fail("gomoku_wrong_winner");
          const occupiedBeforeBlockedMove = occupiedCount();
          await clickMove(14, 14, null);
          if (occupiedCount() !== occupiedBeforeBlockedMove) fail("gomoku_post_win_move_allowed");
          if (failureCodes.size) break;
        }
        if (!failureCodes.size) pass("gomoku_four_win_directions");
        if (!failureCodes.size) pass("gomoku_post_win_lock");

        if (!failureCodes.size && await resetBoard()) {
          await clickMove(7, 7, "black");
          await clickMove(0, 0, "white");
          if (!undoButton || undoButton.disabled) {
            fail("gomoku_undo_unavailable");
          } else {
            undoButton.click();
            await waitForPaint();
            if (occupiedCount() !== 1 || pieceOf(cellAt(0, 0))) fail("gomoku_undo_failed");
          }
        }
        if (!failureCodes.size) pass("gomoku_undo_reset");
        if (document.documentElement.scrollWidth > window.innerWidth + 4) {
          fail("gomoku_horizontal_overflow");
        } else {
          pass("gomoku_viewport_fit");
        }
        finish(failureCodes.size ? "failed" : "passed");
      };

      if (document.readyState === "loading") addEventListener("DOMContentLoaded", run, { once: true });
      else run();
    }

    function sandboxArtifactSource(source, validationId, taskKind) {
      const csp = "<meta http-equiv=\"Content-Security-Policy\" content=\"default-src 'none'; img-src data: blob:; font-src data:; style-src 'unsafe-inline'; script-src 'unsafe-inline';\">";
      const harnessSource = `;(${artifactHarness.toString()})(${JSON.stringify(validationId)}, ${JSON.stringify(taskKind)});`;
      const harnessScript = "<script>" + harnessSource + "</scr" + "ipt>";
      if (/<head[\s>]/i.test(source)) {
        return source.replace(/<head([^>]*)>/i, (head) => `${head}${csp}${harnessScript}`);
      }
      if (/<html[\s>]/i.test(source)) {
        return source.replace(/<html([^>]*)>/i, (html) => `${html}<head>${csp}${harnessScript}</head>`);
      }
      return `<!doctype html><html><head>${csp}${harnessScript}</head><body>${source}</body></html>`;
    }

    function renderArtifactValidation(runner, result) {
      const status = runner.querySelector(".artifact-status");
      const findings = runner.querySelector(".artifact-findings");
      status.className = `artifact-status ${result.status === "passed" ? "good" : result.status === "failed" ? "bad" : "warn"}`;
      status.textContent = result.status === "passed" ? "行为验证通过" : result.status === "failed" ? "行为验证失败" : "已运行 · 任务断言未覆盖";
      findings.textContent = (result.codes || []).join(" · ");
      findings.classList.toggle("visible", result.codes?.length > 0);
    }

    function runArtifactValidation(article, source, taskKind) {
      const runner = document.createElement("section");
      runner.className = "artifact-runner";
      runner.innerHTML = `
        <div class="artifact-toolbar"><strong>HTML 运行结果</strong><span class="artifact-status warn">执行验证中</span></div>
        <iframe class="artifact-frame" title="生成结果运行区" sandbox="allow-scripts"></iframe>
        <p class="artifact-findings"></p>`;
      article.querySelector(".message-body").appendChild(runner);
      const frame = runner.querySelector("iframe");
      const validationId = `artifact-${Date.now()}-${Math.random().toString(16).slice(2)}`;
      return new Promise((resolve) => {
        const timeout = setTimeout(() => {
          cleanup();
          const result = { status: "failed", validator: taskKind, codes: ["artifact_validation_timeout"], checks: [] };
          renderArtifactValidation(runner, result);
          resolve(result);
        }, 12000);
        const onMessage = (event) => {
          if (event.source !== frame.contentWindow
            || event.data?.type !== "norion-artifact-validation"
            || event.data?.validationId !== validationId) return;
          cleanup();
          const result = {
            status: event.data.status,
            validator: event.data.validator,
            codes: Array.isArray(event.data.codes) ? event.data.codes : [],
            checks: Array.isArray(event.data.checks) ? event.data.checks : []
          };
          renderArtifactValidation(runner, result);
          resolve(result);
        };
        const cleanup = () => {
          clearTimeout(timeout);
          removeEventListener("message", onMessage);
        };
        addEventListener("message", onMessage);
        frame.srcdoc = sandboxArtifactSource(source, validationId, taskKind);
      });
    }

    function attachBehaviorValidation(response, result, repairAttempt, feedback) {
      if (!response.norion) response.norion = {};
      const validation = {
        ...result,
        repair_attempt: repairAttempt,
        feedback_applied: feedback?.ok === true,
        feedback_error: feedback?.ok === true ? null : feedback?.error || null
      };
      response.norion.browser_behavior_validation = validation;
      state.behaviorValidation = validation;
      renderInspector();
      return validation;
    }

    async function postBehaviorFeedback(response, result) {
      if (!result || !["passed", "failed"].includes(result.status)) return null;
      const meta = responseMeta(response);
      const capability = meta.behavior_feedback || {};
      const experienceId = capability.experience_id || meta.experience_id;
      if (!capability.token || !experienceId) return { ok: false, error: "behavior_feedback_capability_missing" };
      const evidence = result.status === "passed"
        ? "gomoku_behavior_checks_passed"
        : (result.codes || ["artifact_behavior_failed"]).slice(0, 12).join(",");
      const feedbackResponse = await fetch("/v1/feedback", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({
          action: result.status === "passed" ? "reinforce" : "penalize",
          amount: result.status === "passed" ? 0.25 : 0.45,
          experience_id: experienceId,
          capability_token: capability.token,
          source: "browser_behavior_validation",
          evidence,
          tenant_id: "local-console",
          workspace_id: "rust-norion",
          session_id: state.sessionId
        })
      });
      const data = await feedbackResponse.json().catch(() => ({ error: `HTTP ${feedbackResponse.status}` }));
      return feedbackResponse.ok ? data : { ok: false, error: apiErrorText(data, feedbackResponse.status) };
    }

    function artifactRepairPrompt(taskKind, result, originalPrompt) {
      const evidence = (result.codes || []).slice(0, 12).join(",");
      const contract = taskKind === "gomoku"
        ? "从零重写，不沿用上一版初始化。使用 15x15 DOM 单元格；初始每格只能是 cell，棋盘必须为 0 子；每格带 data-row/data-col；只在点击后给该格增加 black 或 white 类；状态元素包含 status，并明确写胜利者是黑棋或白棋；提供可用的悔棋和重置按钮。胜负检测只能针对最后落子，横、竖、两条斜线分别向正反方向累计同色棋子，总数达到 5 才胜利；四子不得胜利，第五子必须先写入棋盘再判胜，胜利后禁止继续落子。"
        : "修复运行错误，返回完整、可直接执行的单文件 HTML。";
      return `[noiron-browser-validation]\n原始任务：${originalPrompt}\n上一版生成结果执行失败：${evidence || "artifact_behavior_failed"}。${contract}\n只返回从零重写后的完整单文件 HTML，不要解释，不要外部资源。`;
    }

    function appendMessage(role, content, meta = "", isError = false) {
      elements.emptyState.style.display = "none";
      const article = document.createElement("article");
      article.className = `message ${role} ${isError ? "error" : ""}`;
      const title = role === "user" ? "你" : isError ? "请求失败" : "北极星";
      const avatar = role === "user" ? "你" : isError ? "!" : "N";
      article.innerHTML = `
        <div class="avatar" aria-hidden="true">${avatar}</div>
        <div class="message-body">
          <div class="message-head"><strong>${title}</strong><span>${escapeHtml(meta)}</span></div>
          <pre class="message-content">${escapeHtml(content)}</pre>
        </div>`;
      elements.messages.appendChild(article);
      elements.conversation.scrollTop = elements.conversation.scrollHeight;
      return article;
    }

    function setBusy(busy) {
      state.busy = busy;
      elements.sendButton.disabled = busy;
      elements.compareButton.disabled = busy;
      elements.evolveButton.disabled = busy || !state.evolutionToken;
      elements.rollbackButton.disabled = busy || !state.rollbackToken;
      elements.sendButton.textContent = busy ? "生成中" : "生成结果";
    }

    function captureEvolutionTokens(response) {
      const candidate = responseMeta(response).evolution_candidate || {};
      state.evolutionToken = candidate.eligible && candidate.token ? candidate.token : null;
      if (response?.rollback_token) state.rollbackToken = response.rollback_token;
      elements.evolveButton.disabled = state.busy || !state.evolutionToken;
      elements.rollbackButton.disabled = state.busy || !state.rollbackToken;
    }

    async function requestCompletion(prompt, baseMessages) {
      const payload = {
        messages: [...baseMessages, { role: "user", content: prompt }],
        profile: elements.profile.value,
        output: "raw",
        max_tokens: Number(elements.maxTokens.value) || 256,
        tenant_id: "local-console",
        workspace_id: "rust-norion",
        session_id: state.sessionId,
        norion_evolution_preview: true
      };
      const started = performance.now();
      const response = await fetch("/v1/chat/completions", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await response.json().catch(() => ({ error: `HTTP ${response.status}` }));
      const browserElapsedMs = Math.round(performance.now() - started);
      if (!response.ok) throw new Error(apiErrorText(data, response.status));
      return { data, browserElapsedMs };
    }

    async function runSingle(prompt) {
      const baseMessages = state.messages.slice();
      appendMessage("user", prompt, elements.profile.options[elements.profile.selectedIndex].text);
      setBusy(true);
      try {
        const result = await requestCompletion(prompt, baseMessages);
        const answer = result.data?.choices?.[0]?.message?.content || result.data?.answer || "响应中没有文本内容";
        state.previousResponse = state.lastResponse;
        state.lastResponse = result.data;
        state.behaviorValidation = null;
        captureEvolutionTokens(result.data);
        state.messages.push({ role: "user", content: prompt }, { role: "assistant", content: answer });
        state.requestCount += 1;
        elements.requestCount.textContent = state.requestCount;
        const article = appendMessage("assistant", answer, `${result.browserElapsedMs} ms · ${display(result.data?.model)}`);
        const source = extractHtmlArtifact(answer);
        if (source) {
          const taskKind = artifactTaskKind(prompt);
          const validation = await runArtifactValidation(article, source, taskKind);
          const feedback = await postBehaviorFeedback(result.data, validation);
          attachBehaviorValidation(result.data, validation, 0, feedback);
          if (validation.status === "failed") {
            const repairPrompt = artifactRepairPrompt(taskKind, validation, prompt);
            const repair = await requestCompletion(repairPrompt, baseMessages);
            const repairAnswer = repair.data?.choices?.[0]?.message?.content || repair.data?.answer || "响应中没有文本内容";
            state.previousResponse = result.data;
            state.lastResponse = repair.data;
            captureEvolutionTokens(repair.data);
            state.messages.push(
              { role: "user", content: repairPrompt },
              { role: "assistant", content: repairAnswer }
            );
            state.requestCount += 1;
            elements.requestCount.textContent = state.requestCount;
            const repairArticle = appendMessage(
              "assistant",
              repairAnswer,
              `自动修复 1/1 · ${repair.browserElapsedMs} ms · ${display(repair.data?.model)}`
            );
            const repairSource = extractHtmlArtifact(repairAnswer);
            const repairValidation = repairSource
              ? await runArtifactValidation(repairArticle, repairSource, taskKind)
              : { status: "failed", validator: taskKind, codes: ["artifact_repair_html_missing"], checks: [] };
            const repairFeedback = await postBehaviorFeedback(repair.data, repairValidation);
            attachBehaviorValidation(repair.data, repairValidation, 1, repairFeedback);
          }
        }
      } catch (error) {
        const message = error.message === "Failed to fetch"
          ? "服务连接中断：服务可能正在重启或当前不可达。"
          : error.message;
        appendMessage("assistant", message, "", true);
      } finally {
        setBusy(false);
        await refreshRuntime();
        renderInspector();
      }
    }

    async function runComparisonPair(prompt) {
      const baseMessages = state.messages.slice();
      appendMessage("user", prompt, "双轮对比");
      setBusy(true);
      try {
        const first = await requestCompletion(prompt, baseMessages);
        const firstAnswer = first.data?.choices?.[0]?.message?.content || first.data?.answer || "响应中没有文本内容";
        appendMessage("assistant", firstAnswer, `轮次 1 · ${first.browserElapsedMs} ms`);
        const second = await requestCompletion(prompt, baseMessages);
        const secondAnswer = second.data?.choices?.[0]?.message?.content || second.data?.answer || "响应中没有文本内容";
        state.previousResponse = first.data;
        state.lastResponse = second.data;
        captureEvolutionTokens(second.data);
        state.messages.push({ role: "user", content: prompt }, { role: "assistant", content: secondAnswer });
        state.requestCount += 2;
        elements.requestCount.textContent = state.requestCount;
        const evolved = mutationApplied(first.data) || mutationApplied(second.data);
        appendMessage("assistant", secondAnswer, `轮次 2 · ${second.browserElapsedMs} ms · 实际进化：${evolved ? "是" : "否"} · 检查器显示基线与变化`);
      } catch (error) {
        const message = error.message === "Failed to fetch"
          ? "服务连接中断：服务可能正在重启或当前不可达。"
          : error.message;
        appendMessage("assistant", message, "", true);
      } finally {
        setBusy(false);
        await refreshRuntime();
        renderInspector();
      }
    }

    async function runEvolutionAction(action) {
      const token = action === "apply" ? state.evolutionToken : state.rollbackToken;
      if (!token || state.busy) return;
      setBusy(true);
      try {
        const response = await fetch("/v1/evolution", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({
            action,
            token,
            tenant_id: "local-console",
            workspace_id: "rust-norion",
            session_id: state.sessionId
          })
        });
        const data = await response.json().catch(() => ({ error: `HTTP ${response.status}` }));
        if (!response.ok) throw new Error(apiErrorText(data, response.status));
        const previous = state.lastResponse || {};
        state.previousResponse = previous;
        state.lastResponse = {
          ...previous,
          ...data,
          norion: {
            ...(previous.norion || {}),
            ...(data.norion || {}),
            dna_closed_loop: {
              ...(previous.norion?.dna_closed_loop || {}),
              ...(data.norion?.dna_closed_loop || {})
            },
            evolution_candidate: null
          }
        };
        state.evolutionToken = null;
        if (action === "apply") state.rollbackToken = data.rollback_token || null;
        if (action === "rollback") state.rollbackToken = null;
        state.requestCount += 1;
        elements.requestCount.textContent = state.requestCount;
        const dna = responseMeta(state.lastResponse).dna_closed_loop || {};
        const label = action === "apply" ? "DNA 进化已应用" : "DNA 进化已回滚";
        appendMessage("assistant", label, `代际 ${display(dna.generation_before)} → ${display(dna.generation_after)} · ${display(dna.receipt_reason)}`);
      } catch (error) {
        appendMessage("assistant", error.message, "", true);
        if (action === "apply") state.evolutionToken = null;
        if (action === "rollback") state.rollbackToken = null;
      } finally {
        setBusy(false);
        await refreshRuntime();
        renderInspector();
      }
    }

    document.querySelectorAll(".case-button").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".case-button").forEach((item) => item.classList.remove("active"));
        button.classList.add("active");
        const scenario = scenarios[button.dataset.case];
        elements.profile.value = scenario.profile;
        elements.prompt.value = scenario.prompt;
        elements.prompt.focus();
      });
    });

    document.querySelectorAll(".tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        state.activeTab = tab.dataset.tab;
        document.querySelectorAll(".tab").forEach((item) => {
          item.classList.toggle("active", item === tab);
          item.setAttribute("aria-selected", item === tab ? "true" : "false");
        });
        renderInspector();
      });
    });

    document.getElementById("composer").addEventListener("submit", (event) => {
      event.preventDefault();
      const prompt = elements.prompt.value.trim();
      if (prompt && !state.busy) runSingle(prompt);
    });

    elements.compareButton.addEventListener("click", () => {
      const prompt = elements.prompt.value.trim();
      if (prompt && !state.busy) runComparisonPair(prompt);
    });

    elements.evolveButton.addEventListener("click", () => runEvolutionAction("apply"));
    elements.rollbackButton.addEventListener("click", () => runEvolutionAction("rollback"));

    document.getElementById("clearButton").addEventListener("click", () => {
      state.messages = [];
      state.lastResponse = null;
      state.previousResponse = null;
      state.evolutionToken = null;
      state.rollbackToken = null;
      state.behaviorValidation = null;
      elements.messages.innerHTML = "";
      elements.emptyState.style.display = "grid";
      elements.prompt.value = "";
      setBusy(false);
      renderInspector();
    });

    document.getElementById("refreshButton").addEventListener("click", refreshRuntime);
    document.getElementById("mobileInspectorToggle").addEventListener("click", () => {
      elements.inspector.classList.toggle("collapsed");
      if (!elements.inspector.classList.contains("collapsed")) elements.inspector.scrollIntoView({ behavior: "smooth" });
    });

    elements.prompt.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && (event.ctrlKey || event.metaKey)) {
        event.preventDefault();
        document.getElementById("composer").requestSubmit();
      }
    });

    elements.prompt.value = scenarios.general.prompt;
    refreshRuntime();
  </script>
</body>
</html>
