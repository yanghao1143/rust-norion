    platform: github
    kind: weekly
    url: https://github.com/rustcn-org/rust-weekly
    audience: Chinese Rust developers
    fit: high
    status: submitted
    proof: https://github.com/rustcn-org/rust-weekly/issues/11
    next_action: wait_for_maintainer_response
    notes: RustCn weekly accepts issue/PR tips; first project recommendation submitted. Other rustcn-org repos inspected were project-specific, so do not duplicate contributor posts across the org.

