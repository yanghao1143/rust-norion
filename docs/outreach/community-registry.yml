version: 1
owner: yanghao1143
project:
  name: rust-norion
  github: https://github.com/yanghao1143/rust-norion
  gitee: https://gitee.com/babalibaba/rust-norion
policy:
  anti_spam:
    - Do not bulk-post identical recruitment text.
    - Post only where project self-submission, weekly/news tips, discussions, or resource-list PRs are allowed.
    - Prefer one tailored submission per community, then wait for maintainer response.
    - Do not post to unrelated project issue trackers.
    - Record every external post or PR before repeating outreach.
  update_cadence:
    normal: monthly
    major_release: within_72_hours
    minor_iteration: batch_into_next_monthly_update
  manual_review_required: true

templates:
  short_zh: docs/outreach/templates/rust-ai-project-short-zh.md
  short_en: docs/outreach/templates/rust-ai-project-short-en.md
  update_zh: docs/outreach/templates/iteration-update-zh.md
  update_en: docs/outreach/templates/iteration-update-en.md

